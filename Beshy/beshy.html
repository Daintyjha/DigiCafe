
<button
    id="beshyToggle"
    class="beshy-toggle"
    type="button"
    aria-label="Open Beshy"
    aria-controls="beshyChat"
    aria-expanded="false">

    ☕️

</button>





<!-- CHAT WINDOW -->

<div
    id="beshyChat"
    class="beshy-chat"
    role="dialog"
    aria-label="Beshy Digital Cafe Friend"
    aria-hidden="true">





<!-- HEADER -->

<header class="beshy-header">


    <div class="beshy-identity">


        <div
            class="beshy-avatar">

            💚

        </div>


        <div class="beshy-title">

            <h3>
                Beshy Ey Ay
            </h3>


            <p>
                ☕ Your DigiCafe Friend
            </p>

        </div>


    </div>



    <button
        id="beshyClose"
        class="beshy-close"
        type="button">

        ×

    </button>


</header>
