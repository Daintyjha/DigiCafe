<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Community Chat | DigiCafe</title>

    <link rel="stylesheet" href="style.css">
<div id="navbar"></div>
</head>

<body>

    <main class="chat-page">

        <h1>☕ Community Chat</h1>

        <p>Grab a coffee and say hello! 😆</p>

        <div id="chatMessages" class="chat-messages">
            <!-- Messages will appear here -->
        </div>

        <form id="chatForm">

            <input
                type="text"
                id="username"
                placeholder="Your nickname"
                maxlength="20"
                required
            >

            <input
                type="text"
                id="messageInput"
                placeholder="Write a message..."
                maxlength="500"
                required
            >

            <button type="submit">
                Send 💬
            </button>

        </form>

    <div id="beshy-container"></div>
</main>
<div id="footer"></div>
<!-- SCRIPTS -->
<script src="control-panel.js"></script>
<script src="script.js"></script>
<script type="module" src="Beshy/beshy.js"></script>
    <script type="module" src="chat.js"></script>

</body>

</html>
